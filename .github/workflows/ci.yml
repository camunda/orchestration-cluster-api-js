name: PR & Branch CI

on:
  push:
    branches-ignore:
      - main
      - 'stable/**'
  pull_request:
    branches:
      - main
      - 'stable/**'

jobs:
  commitlint:
    if: github.event_name == 'pull_request'
    uses: camunda/sdk-infra/.github/workflows/sdk-commitlint.yml@v1

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        node: [20.x, 22.x, 24.x]
        stack: [simple]
        include:
          - node: 22.x
            stack: full
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: package.json
      - name: Install deps
        run: npm ci
      - name: Generate & Build
        run: npm run build
      - name: Check SDK Example Coverage
        run: node scripts/check-example-coverage.cjs
      - name: Check Method Example Completeness
        run: node scripts/check-method-example-completeness.cjs
      - name: Detect Generation Drift (non-blocking)
        id: drift
        run: |
          if ! git diff --quiet; then
            echo 'drift=true' >> $GITHUB_OUTPUT
            echo 'Generation produced changes (reporting only).' >&2
            git diff --name-only | sed 's/^/CHANGED: /'
            git diff > _gen-drift.patch || true
          else
            echo 'drift=false' >> $GITHUB_OUTPUT
          fi
      - name: Upload Drift Patch
        # Only upload a single canonical drift patch from Node 20.x to avoid artifact 409 conflicts
        if: steps.drift.outputs.drift == 'true' && matrix.node == '20.x' && matrix.stack == 'simple'
        uses: actions/upload-artifact@v7
        with:
          name: generation-drift
          path: _generation-drift.patch
      - name: Unit Tests
        run: npm test

      - name: Start Integration Stack
        uses: camunda/sdk-infra/actions/start-camunda@v1
        with:
          stack: ${{ matrix.stack }}
          docker-dir: docker
      - name: Integration Tests
        run: npm run test:integration
      - name: Stop Integration Stack
        if: always()
        uses: camunda/sdk-infra/actions/stop-camunda@v1
        with:
          stack: ${{ matrix.stack }}
          docker-dir: docker
          artifact-name: integration-docker-logs-${{ matrix.node }}-${{ matrix.stack }}
      - name: Append Job Summary
        if: always()
        run: |
          status="${{ job.status }}"
          driftFlag="${{ steps.drift.outputs.drift }}"
          {
            echo "### Node ${{ matrix.node }} (${{ matrix.stack }}) Summary";
            echo "- Status: ${status}";
            if [ "${driftFlag}" = "true" ]; then
              echo "- Generation Drift: detected";
            else
              echo "- Generation Drift: none";
            fi
            echo "";
          } >> $GITHUB_STEP_SUMMARY
